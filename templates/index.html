<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brain Tumor Detection</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;

    /* Deep dark base */
    background: #0b0b12;
}

/* Balanced purple glow across screen */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background:
        radial-gradient(circle at 30% 30%, rgba(138, 43, 226, 0.18), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(75, 0, 130, 0.15), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(148, 0, 211, 0.10), transparent 50%);

    z-index: -1;
}

/* Clean subtle grid (evenly spread) */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;

    background-image:
        linear-gradient(rgba(138, 43, 226, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(138, 43, 226, 0.06) 1px, transparent 1px);

    background-size: 60px 60px;
    z-index: -1;
}

@keyframes moveBg {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
}

/* ---------- ANIMATION ---------- */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ---------- CONTAINER ---------- */
.container {
    margin-top: 60px;
    animation: fadeIn 1s ease-in-out;
    position: relative;
    z-index: 1;
}

/* ---------- CARD ---------- */
.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    width: 350px;
}

/* ---------- TITLE ---------- */
h1 {
    font-size: 38px;
}

.subtitle {
    color: #ccc;
    margin-bottom: 20px;
}

/* ---------- BUTTON ---------- */
button {
    margin-top: 15px;
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #8e2de2, #4a00e0);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #8e2de2;
}

/* ---------- IMAGE ---------- */
img {
    width: 320px;
    border-radius: 12px;
    margin-top: 15px;
    box-shadow: 0 0 15px black;
    transition: 0.3s;
}

img:hover {
    transform: scale(1.05);
}

/* ---------- RESULT ---------- */
.result {
    margin-top: 20px;
    animation: fadeIn 1s ease-in-out;
}

.prediction {
    font-size: 22px;
    font-weight: bold;
}

.confidence {
    color: #00ffcc;
    margin-top: 5px;
}

/* ---------- PROGRESS BAR ---------- */
.progress-bar {
    width: 100%;
    height: 10px;
    background: #444;
    border-radius: 10px;
    margin-top: 10px;
}

.progress {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #8e2de2, #00ffcc);
    width: 0%;
    transition: width 1s ease-in-out;
}

/* ---------- LOADER ---------- */
.loader {
    display: none;
    margin-top: 15px;
}

.loader div {
    width: 10px;
    height: 10px;
    background: white;
    display: inline-block;
    margin: 3px;
    border-radius: 50%;
    animation: bounce 1s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    to { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Brain Tumor Detection</h1>
    <p class="subtitle">Upload MRI scan to detect tumor type</p>

    <div class="card">

        <!-- FORM -->
        <form method="POST" action="/predict" enctype="multipart/form-data" onsubmit="showLoader()">
            <input type="file" name="file" onchange="previewImage(event)" required>
            <br>
            <img id="preview" style="display:none;">
            <br>
            <button type="submit">Analyze</button>
        </form>

        <!-- LOADER -->
        <div class="loader" id="loader">
            <div></div><div></div><div></div>
            <p>Analyzing...</p>
        </div>

        <!-- RESULT SECTION -->
        {% if prediction %}
        <div class="result">
            <div class="prediction">Prediction: {{ prediction }}</div>
            <div class="confidence">Confidence: {{ confidence }}</div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
        </div>
        {% endif %}

    </div>
</div>

<script>
// IMAGE PREVIEW
function previewImage(event) {
    const img = document.getElementById("preview");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}

// LOADER
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

// PROGRESS BAR ANIMATION
window.onload = function() {
    let confText = "{{ confidence or 0 }}";
    if(confText){
        let value = parseFloat(confText);
        document.getElementById("progress").style.width = value + "%";
    }
}
</script>

</body>
</html>
